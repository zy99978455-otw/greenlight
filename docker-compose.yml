services:
  postgres:
    image: postgres:15-alpine
    container_name: greenlight_db
    restart: always
    environment:
      POSTGRES_USER: greenlight
      POSTGRES_PASSWORD: pa55word
      POSTGRES_DB: greenlight
    ports:
      - "5432:5432"
    volumes:
      - greenlight-db-data:/var/lib/postgresql/data

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: greenlight_prometheus
#    network_mode: "host"
    ports:
      - "9090:9090"
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:10.4.1
    container_name: greenlight_grafana
    ports:
      - "13000:3000"  # 🚀 改成 13000，绝对不会有人和你抢！
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  greenlight-db-data:
