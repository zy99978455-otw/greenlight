version: '3.8'

services:
  postgres:
    image: postgres:15-alpine  # 推荐用 alpine 版本，体积极小，下载快
    container_name: greenlight_db
    restart: always
    environment:
      POSTGRES_USER: greenlight       # 数据库用户名
      POSTGRES_PASSWORD: pa55word     # 数据库密码（替换为你之前项目里用的密码）
      POSTGRES_DB: greenlight         # 默认创建的数据库名
    ports:
      - "5432:5432"  # 将容器的 5432 端口映射到你电脑（Ubuntu宿主机）的 5432 端口
    volumes:
      - greenlight-db-data:/var/lib/postgresql/data  # 核心点：数据持久化挂载

volumes:
  greenlight-db-data:  # 让 Docker 替你管理数据存储位置